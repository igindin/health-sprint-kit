# Health Sprint Kit - каталог скилов
#
# Набор настоящих Claude Skills для продвинутой аудитории, которая строит свои
# health-системы. Каждый скил самодостаточен: работает в твоей папке с твоим
# Claude/Codex, БЕЗ openhealth-движка. Русский, помощник не врач, уровни доверия
# C1-C5, red-flags → врач, данные локально.
#
# Как подключить: скопируй нужный skills/<name>/SKILL.md к себе (или направь
# своего агента на этот репозиторий) и адаптируй под свою цель. Не копируй
# вслепую - форкай и переписывай.

skills:
  - id: openhealth-starter
    path: skills/openhealth-starter/SKILL.md
    title: Старт с нуля
    summary: Собрать первую персональную health-систему за один проход - цель, контекст, источники, один паттерн, лёгкий чек-ин. Для тех, кто только начинает.
    audience: начинающие
    triggers: ["хочу начать следить за здоровьем", "собери мне health-систему", "с чего начать"]

  - id: health-context-system
    path: skills/health-context-system/SKILL.md
    title: Построй свою систему (3 слоя)
    summary: Контекст / скилы / агенты - онтология волта и неминг-конвенция; генерирует AGENTS.md / CLAUDE.md / about-me.md под твою структуру; приводит в порядок уже существующую папку. Для тех, кто строит систему.
    audience: продвинутые
    triggers: ["построить свою систему здоровья", "наведи порядок в health-данных", "сделай AGENTS.md под здоровье", "разложи волт по слоям"]

  - id: health-deep-research
    path: skills/health-deep-research/SKILL.md
    title: Дип-ресёрч + консилиум
    summary: Глубокий разбор одного параметра (железо/холестерин/сон/HRV) - запрос вместо ответа из головы, источники C1-C5, вторая модель критикует, red-flags → врач, сложить в личную библиотеку референсов.
    audience: продвинутые
    triggers: ["что известно про железо", "разберись с холестерином", "источники по HRV", "собери доказательную базу"]

  - id: health-journal
    path: skills/health-journal/SKILL.md
    title: Журнал образа жизни
    summary: Выбрать 3-5 поведений из библиотеки на 184 пункта, отметка за 20 секунд, связать с самочувствием, осторожные корреляции C1-C5. Внутри - готовые промпты intake (анализы из почты, скриншоты вместо интеграций).
    audience: все
    triggers: ["хочу вести дневник здоровья", "журнал образа жизни", "что отслеживать каждый день", "отметь про вчера"]

  - id: lab-interpretation
    path: skills/lab-interpretation/SKILL.md
    title: Разбор анализов
    summary: Нормализация значений и единиц, оптимальные (не только референсные) диапазоны с уровнем доверия, guardrails - без диагнозов, неопределённость явно, red-flags → врач, дозы не меняем.
    audience: все
    triggers: ["разбери мой анализ крови", "что в анализах обсудить с врачом", "переведи единицы анализа", "оптимальный диапазон"]

# Материалы кита (не скилы, но используются скилами и человеком):
resources:
  - path: library/behaviors.md
    summary: 184 поведения из дневника WHOOP по категориям - сырьё для журнала (health-journal).
  - path: research/lifestyle-evidence.md
    summary: Готовая доказательная база (образ жизни → данные → действие) с источниками и C1-C5 - пример и материал для health-deep-research.
  - path: templates/about-me.md
    summary: Шаблон персонального контекста.
  - path: templates/goal.md
    summary: Шаблон цели + паттерна под наблюдением.
  - path: templates/layers.md
    summary: Модель слоёв данных (онтология).
  - path: templates/naming-convention.md
    summary: Конвенция именования файлов.
  - path: AGENTS.md
    summary: Эталонный контракт для агента (онтология, режимы, слой доверия, дисклеймер) - копируешь к себе.
  - path: CLAUDE.md
    summary: Тонкий Claude-адаптер, импортит AGENTS.md.
